<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecionando para o WhatsApp...</title>
<style>
  :root {
    --wa-green: #25D366;
    --wa-dark: #075E54;
    --bg: #ECE5DD;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: #111;
    text-align: center;
    padding: 24px;
  }
  .card {
    max-width: 360px;
    width: 100%;
  }
  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid var(--wa-green);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--wa-dark);
    margin: 0 0 8px;
  }
  p {
    font-size: 14px;
    color: #555;
    margin: 0 0 24px;
  }
  a.btn {
    display: inline-block;
    background: var(--wa-green);
    color: #fff;
    text-decoration: none;
    padding: 14px 28px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 16px;
  }
  a.btn:focus-visible {
    outline: 3px solid var(--wa-dark);
    outline-offset: 2px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Abrindo o WhatsApp...</h1>
    <p>Se não abrir automaticamente, toque no botão abaixo.</p>
    <a class="btn" id="waLink" href="https://wa.me/5598982113131?text=Ol%C3%A1!%20Vim%20pelo%20an%C3%BAncio.">
      Falar no WhatsApp
    </a>
  </div>

  <!-- Meta Pixel Code -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '2629550804097646');
  fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=2629550804097646&ev=PageView&noscript=1" />
  </noscript>
  <!-- End Meta Pixel Code -->

  <script>
    // Redireciona automaticamente após um pequeno delay,
    // dando tempo do Pixel disparar o PageView antes de sair da página.
    setTimeout(function () {
      window.location.href = document.getElementById('waLink').href;
    }, 1200);
  </script>
</body>
</html>
